# Local development stack for APIDiff.
#
#   docker compose up --build
#
# The dashboard runs separately in dev mode: `cd web/dashboard && npm run dev`.
# Kubernetes uses HTTP liveness probes against each service's /healthz.
#
# Telemetry: services export OTLP to the otel-collector, which logs to console.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ./infra/otel/collector.yaml:/etc/otel/collector.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apidiff
      POSTGRES_PASSWORD: apidiff
      POSTGRES_DB: apidiff
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apidiff"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      # Root context so the shared proto/ contracts are in scope at build time.
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=apidiff;Username=apidiff;Password=apidiff
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  replay-engine:
    build:
      context: ./services/replay-engine
    environment:
      PORT: "8081"
      GRPC_PORT: "9090"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8081:8081"   # HTTP health
      - "9090:9090"   # gRPC ReplayService

  analysis:
    build:
      context: ./services/analysis
    environment:
      PORT: "8082"
      GRPC_PORT: "9091"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8082:8082"   # HTTP health
      - "9091:9091"   # gRPC AnalysisService

volumes:
  pgdata:
