name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # Committed secrets fail the build. Test fixtures contain deliberate fake
      # secrets (for sanitizer tests), so that directory is excluded.
      - name: Secret scan
        run: trivy fs --scanners secret --skip-dirs services/api/tests --severity CRITICAL,HIGH --exit-code 1 .

      # Dependency and IaC misconfiguration findings are reported (non-blocking
      # for now; tighten once the baseline is clean).
      - name: Vulnerability & misconfiguration scan
        run: trivy fs --scanners vuln,misconfig --severity CRITICAL,HIGH --exit-code 0 .
